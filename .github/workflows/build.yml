Excellent ! On a tout décodé. Voici ce qu'on a trouvé :

Le protocole réel de la montre iqibla QW01s :

La montre n'utilise pas le format AB 00 ... FF 72 qu'on avait supposé. Elle utilise un protocole custom avec du MessagePack en payload. Voici la vraie structure confirmée par le log :

ATT WRITE_CMD → handle 0x0082 (AE01)
│
├── [seq_lo] [seq_hi]          → compteur de séquence
├── [0x21]                     → direction HOST→MONTRE
├── [CMD]                      → 0x36 = notif titre seul
│                                0x46 = notif titre + corps
├── [inner_len 4 bytes LE]     → taille du payload
└── Payload MessagePack :
    ├── 0xCD 0x27 0x10         → uint16 = 10000 (ID fixe iqibla)
    ├── 0xCE [4 bytes]         → uint32 paramètre interne
    ├── 0x00                   → flag
    ├── 0xCE 0x6A 0x04 0x80 0x34  → uint32 ID app/contexte (fixe)
    ├── 0x00                   → séparateur
    ├── 0xA? + "Papa"          → fixstr TITRE
    ├── 0xB? + "6 nouveaux…"   → fixstr CORPS
    ├── 0x01                   → flag non-lu
    └── 0xAC + "com.whatsapp"  → fixstr bundle ID
