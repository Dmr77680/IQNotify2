name: Build IQNotify IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Build IPA
        run: |
          xcodebuild -project IQNotify.xcodeproj \
            -scheme IQNotify \
            -configuration Debug \
            -archivePath build/IQNotify.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_ENTITLEMENTS=IQNotify/IQNotify.entitlements
          
          mkdir -p build/Payload
          cp -r build/IQNotify.xcarchive/Products/Applications/IQNotify.app build/Payload/
          cd build
          zip -r IQNotify.ipa Payload
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: IQNotify-IPA
          path: build/IQNotify.ipa
