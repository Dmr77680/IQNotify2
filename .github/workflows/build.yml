name: Build IQNotify IPA
 
on:
  push:
    branches: [ main ]
  workflow_dispatch:
 
jobs:
  build:
    runs-on: macos-latest
 
    steps:
      - uses: actions/checkout@v3
 
      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.4.app
 
      - name: Build Archive
        run: |
          xcodebuild \
            -project IQNotify.xcodeproj \
            -scheme IQNotify \
            -configuration Debug \
            -destination "generic/platform=iOS" \
            -archivePath build/IQNotify.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_ENTITLEMENTS=IQNotify/IQNotify.entitlements \
            ONLY_ACTIVE_ARCH=NO
 
      - name: Package IPA
        run: |
          mkdir -p build/Payload
          cp -r "build/IQNotify.xcarchive/Products/Applications/IQNotify.app" build/Payload/
          cd build
          zip -r IQNotify.ipa Payload/
 
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: IQNotify-IPA
          path: build/IQNotify.ipa
          retention-days: 30
 














